# ════════════════════════════════════════════════════════════════════
# QRTagsPro — nixpacks.toml pour Coolify
#
# ⚠️ Coolify utilise nixpacks (PAS le Dockerfile) pour builder.
#
# Setup:
#   1. npm install (pas bun — problèmes avec lightningcss)
#   2. npx prisma generate + npm run build
#   3. Start: prisma db push + migration script + node server.js
# ════════════════════════════════════════════════════════════════════

[phases.setup]
nixPkgs = ['nodejs_20', 'openssl']
aptPkgs = ['sqlite3', 'ca-certificates']

[phases.install]
cmds = [
  'npm install --legacy-peer-deps --no-audit --no-fund'
]

[phases.build]
cmds = [
  'npx prisma generate',
  'npm run build'
]
dependsOn = ['install']

[start]
# Étapes (séparées par ; pour continuer même si une échoue):
# 1. mkdir — crée les répertoires nécessaires
# 2. npx prisma db push — crée/met à jour le schéma DB (toutes les tables + colonnes)
# 3. node scripts/migrate-qrtags-columns.cjs — migration idempotente (backup)
# 4. npm start — démarre le serveur Next.js standalone (node .next/standalone/server.js)
cmd = 'mkdir -p /app/data /app/data/backups /app/public/uploads/damage && npx prisma db push --skip-generate --accept-data-loss 2>&1; node scripts/migrate-qrtags-columns.cjs 2>&1; npm start'

[variables]
NODE_ENV = 'production'
NEXT_TELEMETRY_DISABLED = '1'
PORT = '3000'
HOSTNAME = '0.0.0.0'
DATABASE_URL = 'file:/app/data/qrtags.db'
