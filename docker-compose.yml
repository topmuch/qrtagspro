# ════════════════════════════════════════════════════════════════════
# QRTagsPro — docker-compose.yml
#
# Coolify utilise nixpacks.toml par défaut (pas ce fichier).
# Ce fichier est fourni pour un déploiement Docker manuel.
# ════════════════════════════════════════════════════════════════════

services:
  qrtagspro:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qrtagspro
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - DATABASE_URL=file:/app/data/qrtags.db
      - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL:-http://localhost:3000}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-me-in-prod-32-chars-min}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-change-me-in-prod-32-chars-min}
      - CRON_SECRET=${CRON_SECRET:-change-me}
      - CRON_BACKUP_ENABLED=${CRON_BACKUP_ENABLED:-true}
      - CRON_BACKUP_SECRET=${CRON_BACKUP_SECRET:-change-me}
    volumes:
      - qrtagspro_data:/app/data
      - qrtagspro_uploads:/app/public/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  qrtagspro_data:
    driver: local
  qrtagspro_uploads:
    driver: local
